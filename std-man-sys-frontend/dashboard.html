<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Student Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="navbar">
    <div class="container">
        <h1>Student Management System</h1>
        <div class="user-info">
            <span id="username"></span>
            <button onclick="logout()">Logout</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="dashboard-header">
        <button class="btn" onclick="showAddModal()">+ Add Student</button>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search by name..." onkeyup="searchStudents()">
            <select id="courseFilter" onchange="filterByCourse()">
                <option value="">All Courses</option>
                <option value="Computer Science">Computer Science</option>
                <option value="Data Science">Data Science</option>
                <option value="Physics">Physics</option>
            </select>
            <button class="btn-secondary" onclick="loadStudents()">Refresh</button>
        </div>
    </div>

    <div id="studentGrid" class="student-grid"></div>
</div>

<div id="studentModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Add Student</h3>
        <form id="studentForm">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" id="firstName" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" id="lastName" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Course</label>
                <input type="text" id="course" required>
            </div>
            <div class="form-group">
                <label>Marks (0-100)</label>
                <input type="number" id="marks" min="0" max="100" required>
            </div>
            <div class="modal-actions">
                <button type="submit" class="btn">Save</button>
                <button type="button" class="btn-danger" onclick="closeModal()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/student.js"></script>
</body>
</html>
